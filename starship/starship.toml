# ~/.config/starship.toml

format = """
[](#eb6f92)\
$os\
$username\
[](bg:#c4a7e7 fg:#eb6f92)\
$directory\
[](fg:#c4a7e7 bg:#26233a)\
$git_branch\
$git_status\
[](fg:#26233a bg:#f6c177)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#f6c177 bg:#191724)\
$docker_context\
[ ](fg:#191724)\
$line_break\
$character"""

palette = "rose_pine"

# --- Символ новой строки ---
[character]
success_symbol = "[➜](bold #eb6f92)"
error_symbol = "[➜](bold #f6c177)"

# --- 1. Пользователь (Pink / Love) ---
[username]
show_always = true
style_user = "bg:#eb6f92 fg:#191724"
style_root = "bg:#eb6f92 fg:#191724"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#eb6f92"
disabled = true

# --- 2. Папка (Lavender / Iris) ---
[directory]
style = "bg:#c4a7e7 fg:#191724"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# --- 3. Git (ИСПРАВЛЕНО: Dark Purple / Overlay) ---
# Теперь этот блок темно-фиолетовый, чтобы сочетаться с лавандовым
[git_branch]
symbol = ""
style = "bg:#26233a fg:#e0def4"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#26233a fg:#e0def4"
format = '[$all_status$ahead_behind ]($style)'

# --- 4. Языки (Gold / Gold) ---
[c]
symbol = " "
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#f6c177 fg:#191724"
format = '[ $symbol ($version) ]($style)'

# --- Docker (Dark / Base) ---
[docker_context]
symbol = " "
style = "bg:#191724 fg:#e0def4"
format = '[ $symbol $context ]($style)'

[time]
disabled = true

# --- Палитра Rose Pine ---
[palettes.rose_pine]
base = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
muted = "#6e6a86"
subtle = "#908caa"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ebbcba"
pine = "#31748f"
foam = "#9ccfd8"
iris = "#c4a7e7"
